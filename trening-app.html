<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1b1d20">
<title>Trening — plan domowy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1d20; --paper:#fbfaf7; --muted:#6b6f76; --line:#e4e2dc; --card:#ffffff;
    --push:#d64541; --push-soft:#fbeceb;
    --pull:#2a6f97; --pull-soft:#eaf1f6;
    --legs:#2d6a4f; --legs-soft:#eaf2ee;
    --core:#b06a10; --core-soft:#f7efe2;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'Barlow',system-ui,sans-serif; font-size:15px; line-height:1.45;
    overscroll-behavior-y:contain;
  }
  #app{max-width:640px;margin:0 auto;padding:14px 14px calc(86px + var(--safe-b))}

  /* type */
  .disp{font-family:'Barlow Condensed',sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.01em}
  .kicker{font-family:'Barlow Condensed',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.13em;font-size:12px;color:var(--muted)}
  h1{font-size:34px;line-height:1.02}
  h2{font-size:24px;line-height:1.05}

  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .daycard{display:flex;align-items:center;gap:14px;cursor:pointer}
  .daymark{width:54px;height:54px;border-radius:12px;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:34px;flex:none}
  .daycard .meta{flex:1;min-width:0}
  .daycard .t{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:21px;text-transform:uppercase;line-height:1.05}
  .daycard .s{font-size:13px;color:var(--muted)}
  .chev{color:var(--muted);font-size:22px}

  /* buttons */
  button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    border:1.5px solid var(--ink);border-radius:10px;padding:10px 16px;
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:16px;
    text-transform:uppercase;letter-spacing:.06em;background:#fff;
  }
  .btn.primary{background:var(--ink);color:#fff}
  .btn.small{padding:6px 11px;font-size:14px;border-width:1px}
  .btn.ghost{border-color:var(--line);color:var(--muted)}
  .btn:active{transform:translateY(1px)}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}

  /* exercise row */
  .ex{padding:0;overflow:hidden}
  .exhead{display:flex;gap:12px;padding:12px 14px;align-items:flex-start}
  .fig{width:120px;flex:none;border-radius:10px;padding:4px}
  .fig svg{display:block;width:100%;height:auto}
  .exbody{flex:1;min-width:0}
  .exname{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px;text-transform:uppercase;line-height:1.1}
  .tag{display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-radius:4px;padding:2px 6px;margin-left:6px;vertical-align:2px}
  .dose{font-size:13.5px;font-weight:600;margin-top:3px}
  .last{font-size:12.5px;color:var(--muted);margin-top:2px}
  .cues{font-size:13px;color:#3a3d42;margin-top:6px}
  .cues li{margin-left:16px;margin-bottom:2px}
  .prog{font-size:12.5px;color:var(--muted);margin-top:6px}
  .prog b{color:var(--ink)}
  .editbar{display:flex;gap:6px;border-top:1px dashed var(--line);padding:8px 14px;background:#fcfbf8}
  .editbar .btn{flex:1}

  /* chips */
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
  .chip{border:1px solid var(--line);border-radius:999px;padding:5px 13px;font-size:13px;font-weight:600;background:#fff}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  /* workout */
  .sets{display:flex;gap:8px;padding:0 14px 12px;flex-wrap:wrap;align-items:center}
  .sets input{
    width:64px;padding:9px 6px;border:1.5px solid var(--line);border-radius:9px;
    font:inherit;font-weight:600;text-align:center;background:#fff;
  }
  .sets input:focus{outline:none;border-color:var(--ink)}
  .setlbl{font-size:12px;color:var(--muted)}

  /* timer */
  #timerbar{
    position:fixed;left:0;right:0;bottom:calc(64px + var(--safe-b));z-index:40;
    display:none;justify-content:center;pointer-events:none;
  }
  #timerbar .inner{
    pointer-events:auto;background:var(--ink);color:#fff;border-radius:999px;
    padding:9px 18px;display:flex;gap:14px;align-items:center;
    font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:.04em;
    box-shadow:0 6px 20px rgba(0,0,0,.25);
  }
  #timerbar button{color:#f0b1ae;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  #timerbar.done .inner{background:var(--legs)}

  /* tabbar */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:#fff;border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:8px 6px calc(8px + var(--safe-b));
  }
  nav button{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:13px;
    text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:4px 0;
  }
  nav button.on{color:var(--ink)}
  nav .ic{font-size:19px;line-height:1}

  /* modal */
  #modal{position:fixed;inset:0;z-index:60;background:rgba(20,20,22,.45);display:none;align-items:flex-end;justify-content:center}
  #modal .sheet{
    background:var(--paper);width:100%;max-width:640px;max-height:82vh;overflow:auto;
    border-radius:18px 18px 0 0;padding:16px 14px calc(20px + var(--safe-b));
  }
  .sheethead{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .pick{display:flex;gap:12px;align-items:center;width:100%;text-align:left;padding:10px;border:1px solid var(--line);border-radius:12px;background:#fff;margin-bottom:8px}
  .pick .fig{width:92px}
  .pick .n{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;text-transform:uppercase;line-height:1.1}
  .pick .d{font-size:12.5px;color:var(--muted)}

  /* misc */
  .note{border:1px dashed var(--ink);border-radius:12px;padding:12px 14px;font-size:13.5px;margin-bottom:12px}
  .note b{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.07em;font-size:14px}
  .hot{background:var(--push-soft);border:1px solid var(--push)}
  .warnbar{background:#fff3cd;border:1px solid #e0c469;border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:12px;display:none}
  .histday{margin-bottom:14px}
  .histdate{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:17px;text-transform:uppercase}
  .histrow{font-size:13.5px;padding:3px 0;border-bottom:1px dotted var(--line);display:flex;justify-content:space-between;gap:10px}
  textarea{width:100%;min-height:110px;font:12px/1.4 ui-monospace,monospace;border:1px solid var(--line);border-radius:10px;padding:10px;background:#fff}
  input.dayname{font:inherit;font-weight:700;border:1.5px solid var(--line);border-radius:9px;padding:8px 10px;width:100%;background:#fff}
  .back{font-size:14px;color:var(--muted);margin-bottom:8px;display:inline-flex;gap:6px;align-items:center}
  .rowbtns{display:flex;gap:6px}
  .rowbtns .btn{padding:6px 9px}
  @media (prefers-reduced-motion:reduce){ svg animate{display:none} }
</style>
</head>
<body>
<div id="app"></div>

<div id="timerbar"><div class="inner"><span id="tval">1:30</span><button onclick="stopTimer()">stop</button></div></div>

<nav>
  <button data-v="plan"  onclick="go('plan')"><span class="ic">▦</span>Plan</button>
  <button data-v="db"    onclick="go('db')"><span class="ic">≣</span>Baza</button>
  <button data-v="hist"  onclick="go('hist')"><span class="ic">◷</span>Historia</button>
  <button data-v="help"  onclick="go('help')"><span class="ic">ⓘ</span>Info</button>
</nav>

<div id="modal"><div class="sheet" id="sheet"></div></div>

/* ============================== STORAGE ============================== */
const mem = {};
let storageOK = true;
function load(k, d){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; }catch(e){ storageOK = false; return (k in mem) ? mem[k] : d; } }
function save(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){ storageOK = false; mem[k] = v; } }

  push:{ label:'Pchanie',  c:'var(--push)', s:'var(--push-soft)' },

/* ============================== SVG RENDER ============================== */
function animTag(attr, a, b, d){
  if(a === b) return '';
  return `<animate attributeName="${attr}" values="${a};${b};${a}" dur="${d}s" repeatCount="indefinite"/>`;
}
function propSVG(p, A){
  if(p === 'ground') return `<line x1="10" y1="105" x2="190" y2="105" stroke="#b9b4a8" stroke-width="3"/>`;
  if(p === 'bar')    return `<line x1="30" y1="16" x2="170" y2="16" stroke="#1b1d20" stroke-width="5" stroke-linecap="round"/>`;
  if(p[0] === 'box') return `<rect x="${p[1]}" y="${p[2]}" width="${p[3]}" height="${p[4]}" fill="none" stroke="#1b1d20" stroke-width="3"/>`;
  if(p[0] === 'chair') return `<rect x="140" y="66" width="44" height="8" fill="#1b1d20"/><line x1="146" y1="74" x2="146" y2="104" stroke="#1b1d20" stroke-width="4"/><line x1="178" y1="74" x2="178" y2="104" stroke="#1b1d20" stroke-width="4"/>`;
  if(p[0] === 'db'){
    const [a,b] = [p[1], p[2]], d = A.d;
    return `<rect x="${a[0]}" y="${a[1]}" width="24" height="9" rx="3" fill="#1b1d20">${animTag('x',a[0],b[0],d)}${animTag('y',a[1],b[1],d)}</rect>`;
  }
  return '';
}
function exSVG(id){
  const ex = DB[id]; if(!ex) return '';
  const A = ex.anim, col = CATS[ex.c].c, d = A.d;
  let s = `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-label="${ex.n} — schemat">`;
  for(const p of A.props) s += propSVG(p, A);
  s += `<g stroke="${col}" stroke-width="5" stroke-linecap="round" fill="none">`;
  for(const [a,b] of A.lines){
    s += `<line x1="${a[0]}" y1="${a[1]}" x2="${a[2]}" y2="${a[3]}">`
       + animTag('x1',a[0],b[0],d) + animTag('y1',a[1],b[1],d)
       + animTag('x2',a[2],b[2],d) + animTag('y2',a[3],b[3],d)
       + `</line>`;
  }
  s += `</g>`;
  const [ha,hb] = A.head;
  s += `<circle cx="${ha[0]}" cy="${ha[1]}" r="9" fill="${col}">${animTag('cx',ha[0],hb[0],d)}${animTag('cy',ha[1],hb[1],d)}</circle>`;
  return s + `</svg>`;
}

/* ============================== POMOCNICZE ============================== */
const $app = document.getElementById('app');
function esc(s){ return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function savePlan(){ save('wt_plan', plan); }
function saveHist(){ save('wt_hist', hist); }
function lastSets(exId){
  for(let i = hist.length - 1; i >= 0; i--){
    const e = hist[i].items.find(x => x.ex === exId && x.sets.length);
    if(e) return { date: hist[i].date, sets: e.sets };
  }
  return null;
}
function fmtDate(iso){ const d = new Date(iso); return d.toLocaleDateString('pl-PL', {weekday:'short', day:'numeric', month:'short'}); }
function go(v){ state.view = v; state.edit = false; render(); window.scrollTo(0,0); }

/* ============================== TIMER ============================== */
let tInt = null, tLeft = 0;
function startTimer(sec){
  stopTimer();
  tLeft = sec;
  const bar = document.getElementById('timerbar');
  bar.style.display = 'flex'; bar.classList.remove('done');
  tick();
  tInt = setInterval(tick, 1000);
}
function tick(){
  const el = document.getElementById('tval');
  if(tLeft <= 0){
    clearInterval(tInt); tInt = null;
    el.textContent = 'Przerwa skończona — jazda';
    document.getElementById('timerbar').classList.add('done');
    setTimeout(stopTimer, 4000);
    return;
  }
  el.textContent = Math.floor(tLeft/60) + ':' + String(tLeft%60).padStart(2,'0');
  tLeft--;
}
function stopTimer(){
  if(tInt) clearInterval(tInt);
  tInt = null;
  document.getElementById('timerbar').style.display = 'none';
}

/* ============================== MODAL / PICKER ============================== */
const $modal = document.getElementById('modal'), $sheet = document.getElementById('sheet');
let pickCB = null, pickCat = 'all';
function openPicker(cat, cb){
  pickCB = cb; pickCat = cat || 'all';
  renderPicker();
  $modal.style.display = 'flex';
}
function closeModal(){ $modal.style.display = 'none'; pickCB = null; }
$modal.addEventListener('click', e => { if(e.target === $modal) closeModal(); });
function setPickCat(c){ pickCat = c; renderPicker(); }
function renderPicker(){
  const chips = ['all', ...Object.keys(CATS)].map(c =>
    `<button class="chip ${pickCat===c?'on':''}" onclick="setPickCat('${c}')">${c==='all'?'Wszystkie':CATS[c].label}</button>`).join('');
  const items = Object.entries(DB)
    .filter(([id,e]) => pickCat === 'all' || e.c === pickCat)
    .map(([id,e]) => `
      <button class="pick" onclick="pickEx('${id}')">
        <span class="fig" style="background:${CATS[e.c].s}">${exSVG(id)}</span>
        <span><span class="n">${e.n}</span><br><span class="d">${CATS[e.c].label} · ${e.eq} · ${e.dose}</span></span>
      </button>`).join('');
  $sheet.innerHTML = `
    <div class="sheethead"><h2 class="disp">Wybierz ćwiczenie</h2><button class="btn small ghost" onclick="closeModal()">Zamknij</button></div>
    <div class="chips">${chips}</div>${items}`;
}
function pickEx(id){ if(pickCB) pickCB(id); closeModal(); render(); }

/* ============================== AKCJE PLANU ============================== */
function addDay(){
  plan.days.push({ name:'Nowy dzień', items:[] });
  savePlan(); state.dayIdx = plan.days.length - 1; state.view = 'day'; state.edit = true; render();
}
function delDay(i){
  if(!confirm('Usunąć ten dzień treningowy?')) return;
  plan.days.splice(i,1); savePlan(); state.view = 'plan'; render();
}
function renameDay(i, v){ plan.days[i].name = v.slice(0,60); savePlan(); }
function moveItem(d, i, dir){
  const arr = plan.days[d].items, j = i + dir;
  if(j < 0 || j >= arr.length) return;
  [arr[i], arr[j]] = [arr[j], arr[i]]; savePlan(); render();
}
function delItem(d, i){ plan.days[d].items.splice(i,1); savePlan(); render(); }
function swapItem(d, i){
  const cat = DB[plan.days[d].items[i].ex]?.c;
  openPicker(cat, id => { plan.days[d].items[i] = { ex:id, dose: DB[id].dose }; savePlan(); });
}
function addItem(d){ openPicker('all', id => { plan.days[d].items.push({ ex:id, dose: DB[id].dose }); savePlan(); }); }
function resetPlan(){
  if(!confirm('Przywrócić domyślny plan A/B/C? Historia treningów zostanie.')) return;
  plan = JSON.parse(JSON.stringify(DEFAULT_PLAN)); savePlan(); render();
}

/* ============================== SESJA TRENINGOWA ============================== */
function startSession(d){
  state.session = { dayIdx: d, vals: {} };
  state.view = 'workout'; render(); window.scrollTo(0,0);
}
function setVal(item, set, v){
  const s = state.session;
  (s.vals[item] = s.vals[item] || {})[set] = v;
}
function finishSession(){
  const s = state.session, day = plan.days[s.dayIdx];
  const items = day.items.map((it, idx) => ({
    ex: it.ex, dose: it.dose,
    sets: Object.keys(s.vals[idx] || {}).sort((a,b)=>a-b).map(k => s.vals[idx][k]).filter(v => v !== '')
  }));
  if(!items.some(i => i.sets.length)){ alert('Nic nie wpisałeś — nie ma czego zapisać.'); return; }
  hist.push({ date: new Date().toISOString(), day: day.name, items });
  saveHist();
  state.session = null; state.view = 'hist'; render(); window.scrollTo(0,0);
}
function cancelSession(){
  if(!confirm('Porzucić trening bez zapisu?')) return;
  state.session = null; state.view = 'day'; render();
}
function delSession(i){
  if(!confirm('Usunąć ten wpis z historii?')) return;
  hist.splice(i,1); saveHist(); render();
}

/* ============================== EKSPORT / IMPORT ============================== */
function doExport(){
  const data = JSON.stringify({ plan, hist });
  const ta = document.getElementById('io'); ta.value = data; ta.select();
  try{ navigator.clipboard.writeText(data); alert('Skopiowane do schowka. Wklej gdzieś bezpiecznie (notatka, menedżer haseł).'); }catch(e){}
}
function doImport(){
  const ta = document.getElementById('io');
  try{
    const d = JSON.parse(ta.value);
    if(!d.plan || !Array.isArray(d.plan.days)) throw 0;
    plan = d.plan; hist = Array.isArray(d.hist) ? d.hist : [];
    savePlan(); saveHist(); alert('Wczytane.'); render();
  }catch(e){ alert('To nie wygląda na poprawny eksport z tej aplikacji.'); }
}

/* ============================== WIDOKI ============================== */
function exCard(it, d, i, workout){
  const e = DB[it.ex];
  if(!e) return `<div class="card">Nieznane ćwiczenie (${esc(it.ex)}) <button class="btn small" onclick="delItem(${d},${i})">Usuń</button></div>`;
  const cat = CATS[e.c];
  const last = lastSets(it.ex);
  const lastHtml = last ? `<div class="last">Ostatnio (${fmtDate(last.date)}): <b>${last.sets.map(esc).join(' / ')}</b></div>` : '';
  let setsHtml = '';
  if(workout){
    const v = (state.session.vals[i]) || {};
    setsHtml = `<div class="sets"><span class="setlbl">Powt.:</span>` +
      [0,1,2,3].map(s => `<input type="text" inputmode="numeric" placeholder="S${s+1}" value="${esc(v[s]||'')}" oninput="setVal(${i},${s},this.value)">`).join('') +
      `</div>`;
  }
  let editHtml = '';
  if(state.edit && !workout){
    editHtml = `<div class="editbar">
      <button class="btn small ghost" onclick="moveItem(${d},${i},-1)">↑</button>
      <button class="btn small ghost" onclick="moveItem(${d},${i},1)">↓</button>
      <button class="btn small" onclick="swapItem(${d},${i})">Zamień</button>
      <button class="btn small ghost" onclick="delItem(${d},${i})">Usuń</button>
    </div>`;
  }
  return `<div class="card ex">
    <div class="exhead">
      <div class="fig" style="background:${cat.s}">${exSVG(it.ex)}</div>
      <div class="exbody">
        <div class="exname">${e.n}<span class="tag" style="background:${cat.s};color:${cat.c}">${cat.label}</span></div>
        <div class="dose">${esc(it.dose)}</div>
        ${lastHtml}
        <ul class="cues">${e.cues.map(c=>`<li>${c}</li>`).join('')}</ul>
        <div class="prog"><b>Progresja:</b> ${e.prog}</div>
      </div>
    </div>
    ${setsHtml}${editHtml}
  </div>`;
}

function vPlan(){
  const cards = plan.days.map((day, i) => `
    <div class="card daycard" onclick="state.dayIdx=${i};go('day')">
      <div class="daymark" style="background:${DAY_COLORS[i % DAY_COLORS.length]}">${DAY_LETTERS[i] || '•'}</div>
      <div class="meta"><div class="t">${esc(day.name)}</div>
      <div class="s">${day.items.length} ćw. · ${day.items.map(it => DB[it.ex]?.n.split(' ')[0] || '?').slice(0,4).join(', ')}${day.items.length>4?'…':''}</div></div>
      <div class="chev">›</div>
    </div>`).join('');
  return `
    <div class="kicker">Trening w domu · drążek + hantla</div>

    <div class="warnbar" id="warn">Uwaga: w tym widoku dane się nie zapisują. Otwórz plik w Safari (nie w podglądzie Plików), a najlepiej z hostingu.</div>
    <div style="height:10px"></div>
    ${cards}
    <div class="btnrow">

    <div class="note"><b>Zasada nr 1:</b> w każdej serii zostaw 2–3 powtórzenia w zapasie. Do upadku najwyżej w ostatniej serii ostatniego ćwiczenia. Notuj wyniki — bez tego nie ma progresji.</div>
    <div class="note hot"><b>Boczki — bez ściemy:</b> żadne ćwiczenie brzucha nie spala tłuszczu z boków. Spalanie punktowe nie istnieje; boczki zdejmuje deficyt kaloryczny. Ćwiczenia budują mięśnie pod spodem i siłę tułowia.</div>`;
}

function vDay(){
  const d = state.dayIdx, day = plan.days[d];
  if(!day) { state.view = 'plan'; return vPlan(); }
  const name = state.edit
    ? `<input class="dayname" value="${esc(day.name)}" oninput="renameDay(${d}, this.value)">`
    : `<h1 class="disp" style="font-size:28px">${esc(day.name)}</h1>`;
  return `
    <button class="back" onclick="go('plan')">‹ Plan</button>
    <div class="kicker">Dzień ${DAY_LETTERS[d] || ''}</div>
    ${name}
    <div class="btnrow">
      <button class="btn primary" onclick="startSession(${d})">Rozpocznij trening</button>
      <button class="btn ${state.edit?'':'ghost'}" onclick="state.edit=!state.edit;render()">${state.edit?'Gotowe':'Edytuj'}</button>
      ${state.edit ? `<button class="btn ghost" onclick="delDay(${d})">Usuń dzień</button>` : ''}
    </div>
    ${day.items.map((it,i) => exCard(it, d, i, false)).join('')}
    ${state.edit ? `<button class="btn" style="width:100%" onclick="addItem(${d})">+ Dodaj ćwiczenie</button>` : ''}`;
}

function vWorkout(){
  const s = state.session;
  if(!s){ state.view = 'plan'; return vPlan(); }
  const d = s.dayIdx, day = plan.days[d];
  return `
    <div class="kicker">Trening w toku</div>
    <h1 class="disp" style="font-size:28px">${esc(day.name)}</h1>
    <div class="btnrow">
      <span class="setlbl" style="align-self:center">Przerwa:</span>
      <button class="btn small" onclick="startTimer(60)">1:00</button>
      <button class="btn small" onclick="startTimer(90)">1:30</button>
      <button class="btn small" onclick="startTimer(120)">2:00</button>
      <button class="btn small" onclick="startTimer(180)">3:00</button>
    </div>
    <div class="note">Wpisuj powtórzenia po każdej serii (przy czasówkach wpisz sekundy). Puste pola są pomijane.</div>
    ${day.items.map((it,i) => exCard(it, d, i, true)).join('')}
    <div class="btnrow">
      <button class="btn primary" style="flex:1" onclick="finishSession()">Zakończ i zapisz</button>
      <button class="btn ghost" onclick="cancelSession()">Porzuć</button>
    </div>`;
}

function vDb(){
  const chips = ['all', ...Object.keys(CATS)].map(c =>
    `<button class="chip ${state.filter===c?'on':''}" onclick="state.filter='${c}';render()">${c==='all'?'Wszystkie':CATS[c].label}</button>`).join('');
  const cards = Object.entries(DB)
    .filter(([id,e]) => state.filter === 'all' || e.c === state.filter)
    .map(([id,e]) => {
      const cat = CATS[e.c], last = lastSets(id);
      return `<div class="card ex"><div class="exhead">
        <div class="fig" style="background:${cat.s}">${exSVG(id)}</div>
        <div class="exbody">
          <div class="exname">${e.n}<span class="tag" style="background:${cat.s};color:${cat.c}">${cat.label}</span></div>
          <div class="dose">${e.eq} · ${e.dose}</div>
          ${last ? `<div class="last">Ostatnio: <b>${last.sets.map(esc).join(' / ')}</b></div>` : ''}
          <ul class="cues">${e.cues.map(c=>`<li>${c}</li>`).join('')}</ul>
          <div class="prog"><b>Progresja:</b> ${e.prog}</div>
        </div></div></div>`;
    }).join('');
  return `<div class="kicker">${Object.keys(DB).length} ćwiczeń · schematy poglądowe</div>
    <h1 class="disp">Baza ćwiczeń</h1>
    <div class="chips">${chips}</div>${cards}`;
}

function vHist(){
  if(!hist.length) return `<div class="kicker">Dziennik</div><h1 class="disp">Historia</h1>
    <div class="note" style="margin-top:12px">Pusto. Wejdź w dzień treningowy, kliknij „Rozpocznij trening", wpisuj powtórzenia i zapisz — wpisy pojawią się tutaj, a przy ćwiczeniach zobaczysz „ostatnio".</div>${ioBlock()}`;
  const rows = hist.slice().reverse().map((h, ri) => {
    const i = hist.length - 1 - ri;
    const lines = h.items.filter(it => it.sets.length)
      .map(it => `<div class="histrow"><span>${DB[it.ex]?.n || it.ex}</span><b>${it.sets.map(esc).join(' / ')}</b></div>`).join('');
    return `<div class="card histday">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <div><span class="histdate">${fmtDate(h.date)}</span> <span class="setlbl">· ${esc(h.day)}</span></div>
        <button class="btn small ghost" onclick="delSession(${i})">Usuń</button>
      </div>${lines}</div>`;
  }).join('');
  return `<div class="kicker">${hist.length} zapisanych treningów</div><h1 class="disp">Historia</h1>
    <div style="height:10px"></div>${rows}${ioBlock()}`;
}
function ioBlock(){
  return `<div class="card"><div class="exname" style="margin-bottom:6px">Kopia zapasowa</div>
    <p style="font-size:13px;color:var(--muted);margin-bottom:8px">Dane siedzą w pamięci tej przeglądarki. Rób co jakiś czas eksport — wyczyszczenie danych Safari je skasuje.</p>
    <textarea id="io" placeholder="Tu pojawi się eksport / tu wklej dane do importu"></textarea>
    <div class="btnrow"><button class="btn small" onclick="doExport()">Eksportuj</button><button class="btn small ghost" onclick="doImport()">Importuj</button></div></div>`;
}

function vHelp(){
  return `<div class="kicker">Jak tego używać</div><h1 class="disp">Info</h1>
  <div style="height:10px"></div>
  <div class="card"><div class="exname">Rozgrzewka — zawsze, 5–6 min</div>
    <ul class="cues" style="margin-top:6px">
      <li>Pajacyki 60 s, krążenia ramion przód/tył.</li>
      <li>Hantelki 1,5 kg: unoszenia bokiem ×15, w przód ×15, krążenia prostych rąk ×10 — to ich jedyna sensowna rola.</li>
      <li>Krążenia bioder, 10 powolnych przysiadów, 8 pompek na kolanach.</li>
    </ul></div>
  <div class="card"><div class="exname">Zasady</div>
    <ul class="cues" style="margin-top:6px">
      <li>Zapas 2–3 powtórzeń w każdej serii. Trening kończysz zmęczony, nie zniszczony.</li>
      <li>Minimum dzień przerwy między treningami siłowymi. Basen i piłka w dni wolne.</li>
      <li>Białko ok. 1,6–2 g / kg masy ciała dziennie.</li>
      <li>Progresja: trudniejszy wariant, wolniejsze tempo, pauzy — kiedy górna granica powtórzeń przychodzi łatwo. Historia i „ostatnio" są od tego, żebyś to widział.</li>
      <li>Boczki i brzuch odsłania deficyt kaloryczny, nie ćwiczenia brzucha. Spalanie punktowe nie istnieje.</li>
    </ul></div>
  <div class="card"><div class="exname">Jak zrobić z tego „aplikację"</div>
    <ul class="cues" style="margin-top:6px">
      <li>Wrzuć ten plik na hosting (np. GitHub Pages) i otwórz adres w Safari.</li>
      <li>Udostępnij → „Dodaj do ekranu początkowego" — dostaniesz ikonę i pełny ekran.</li>
      <li>Otwierany lokalnie też działa, ale tylko bezpośrednio w Safari; podgląd w aplikacji Pliki nie uruchamia zapisu danych.</li>
      <li>Dane (plan + historia) żyją w pamięci przeglądarki dla danego adresu — rób eksport w zakładce Historia.</li>
    </ul></div>
  <div class="note">Schematy ćwiczeń są poglądowe: pokazują pozycję i kierunek ruchu, nie zastępują nauki techniki. Jak coś boli w stawie (nie mięśniowo) — odpuść ćwiczenie, nie cały trening.</div>`;
}

/* ============================== RENDER ============================== */
function render(){
  const v = state.view;
  $app.innerHTML = v==='plan' ? vPlan() : v==='day' ? vDay() : v==='workout' ? vWorkout()
                 : v==='db' ? vDb() : v==='hist' ? vHist() : vHelp();
  document.querySelectorAll('nav button').forEach(b => {
    const on = b.dataset.v === v || (v==='day' || v==='workout') && b.dataset.v === 'plan';
    b.classList.toggle('on', on);
  });
  const w = document.getElementById('warn');
  if(w && !storageOK) w.style.display = 'block';
}
render();
</script>
</body>
</html>
